# Yomie — Simplified Docker Compose (Single Container)
# ===========================================================
#
# All-in-one: Go server + Node.js console in a single container.
#
# Quick start (SQLite — default):
#   docker compose -f docker-compose.single.yml up -d --build
#
# With PostgreSQL:
#   PG_PASSWORD=YourStrongPasswordHere \
#   DB_TYPE=postgres DATABASE_URL=postgres://yomie:YourStrongPasswordHere@postgres:5432/yomie \
#     docker compose -f docker-compose.single.yml --profile postgres up -d --build
#
#   Or create a .env file:
#     DB_TYPE=postgres
#     DATABASE_URL=postgres://yomie:YourStrongPasswordHere@postgres:5432/yomie
#     PG_PASSWORD=YourStrongPasswordHere
#   Then: docker compose -f docker-compose.single.yml --profile postgres up -d --build
#
# Access:
#   Web Console: http://localhost:5000
#   Default login: admin / admin

services:
  # Yomie All-in-One (Go server + Node.js console)
  yomie:
    build:
      context: .
      dockerfile: Dockerfile
    image: yomie:local
    pull_policy: never
    container_name: yomie
    hostname: yomie
    ports:
      - "5000:5000"             # Web Console (LAN)
      - "21114:21114"           # HTTP API
      - "21115:21115"           # NAT type test
      - "21116:21116/tcp"       # Signal TCP
      - "21116:21116/udp"       # Signal UDP
      - "21117:21117"           # Relay TCP
      - "21118:21118"           # WebSocket Signal
      - "21119:21119"           # WebSocket Relay
      - "21121:21121"           # RustDesk Client API (WAN)
    volumes:
      - yomie-data:/opt/rustdesk
      - console-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      - API_HOST=0.0.0.0
      - ENCRYPTED_ONLY=1
      - SERVER_BACKEND=yomie
      - HBBS_API_URL=http://127.0.0.1:21114/api
      - BETTERDESK_API_URL=http://127.0.0.1:21114/api
      - RUSTDESK_PATH=/opt/rustdesk
      - DATA_DIR=/app/data
      - DB_PATH=/opt/rustdesk/db_v2.sqlite3
      - PUB_KEY_PATH=/opt/rustdesk/id_ed25519.pub
      - API_KEY_PATH=/opt/rustdesk/.api_key
      - SESSION_SECRET=${SESSION_SECRET:-}
      - DOCKER=true
      # Database — defaults to SQLite; set via .env or command line for PostgreSQL
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_URL=${DATABASE_URL:-}
      # Relay server address (public IP or domain).
      # Auto-detected if not set. MUST be set if auto-detection returns
      # Docker internal IP (172.x.x.x) — remote relay connections will fail otherwise.
      - RELAY_SERVERS=${RELAY_SERVERS:-}
      # Admin credentials (first run only):
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=YourSecurePassword123
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:21114/api/health && curl -sf http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # PostgreSQL (optional — use with --profile postgres)
  postgres:
    image: postgres:16-alpine
    container_name: yomie-postgres
    environment:
      - POSTGRES_USER=yomie
      # BD-2026-007: PG_PASSWORD MUST be set explicitly — do not use default values in production
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD must be set for PostgreSQL}
      - POSTGRES_DB=yomie
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yomie"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # Nginx Reverse Proxy (optional — use with --profile nginx)
  nginx:
    image: nginx:alpine
    container_name: yomie-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - yomie
    profiles:
      - nginx

volumes:
  yomie-data:
  console-data:
  postgres-data:

networks:
  default:
    name: yomie-net
