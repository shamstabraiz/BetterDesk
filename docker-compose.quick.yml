# =============================================================================
# Yomie Console - Quick Start (Pre-built Images)
# =============================================================================
# NO BUILD REQUIRED - uses pre-built images from GitHub Container Registry
#
# Usage:
#   curl -fsSL https://raw.githubusercontent.com/shamstabraiz/Rustdesk-FreeConsole/main/docker-compose.quick.yml -o docker-compose.yml
#   docker compose up -d
#
# Web Console: http://localhost:5000
# Default credentials shown on first startup in logs:
#   docker compose logs console | grep -i password
#
# TROUBLESHOOTING: If you get "denied" or "pull access denied" error,
# images may not be published yet. Build from source instead:
#   git clone https://github.com/shamstabraiz/Rustdesk-FreeConsole.git
#   cd Rustdesk-FreeConsole && docker compose -f docker-compose.yml up -d --build
# =============================================================================

services:
  # Yomie Server (Go) — handles signal, relay, and API
  server:
    image: ghcr.io/shamstabraiz/yomie-server:latest
    container_name: yomie-server
    hostname: yomie-server
    command: ["/usr/local/bin/yomie-server", "-mode", "all", "-key-file", "/opt/rustdesk/id_ed25519"]
    ports:
      - "21114:21114"           # HTTP API
      - "21115:21115"           # NAT type test
      - "21116:21116/tcp"       # Signal TCP
      - "21116:21116/udp"       # Signal UDP
      - "21117:21117"           # Relay TCP
      - "21118:21118"           # WebSocket Signal
      - "21119:21119"           # WebSocket Relay
    volumes:
      - yomie-data:/opt/rustdesk
    environment:
      - ENCRYPTED_ONLY=1
    networks:
      - yomie-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:21114/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Yomie Console — Web Management Interface
  console:
    image: ghcr.io/shamstabraiz/yomie-console:latest
    container_name: yomie-console
    hostname: yomie-console
    ports:
      - "5000:5000"             # Web console
      - "21121:21121"           # RustDesk Client API (WAN)
    volumes:
      - yomie-data:/opt/rustdesk
      - console-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      - API_HOST=0.0.0.0
      - SERVER_BACKEND=yomie
      - BETTERDESK_API_URL=http://yomie-server:21114/api
      - RUSTDESK_PATH=/opt/rustdesk
      - DATA_DIR=/app/data
      - DB_PATH=/app/data/db_v2.sqlite3
      - PUB_KEY_PATH=/opt/rustdesk/id_ed25519.pub
      - API_KEY_PATH=/opt/rustdesk/.api_key
      - WS_HBBS_HOST=yomie-server
      - WS_HBBS_PORT=21116
      - WS_HBBR_HOST=yomie-server
      - WS_HBBR_PORT=21117
      - DOCKER=true
    networks:
      - yomie-net
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  yomie-net:
    driver: bridge

volumes:
  yomie-data:
    name: yomie-data
  console-data:
    name: yomie-console-data
