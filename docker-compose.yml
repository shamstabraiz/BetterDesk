version: '3.8'

services:
    postgres:
        container_name: yomie-postgres
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: yomie
            POSTGRES_PASSWORD: yomie123
            POSTGRES_DB: yomie
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U yomie -d yomie"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        networks:
            - yomie

    server:
        container_name: yomie-server
        build:
            context: .
            dockerfile: Dockerfile.server
        pull_policy: never
        ports:
            - "21114:21114"
            - "21115:21115"
            - "21116:21116"
            - "21116:21116/udp"
            - "21117:21117"
            - "21118:21118"
            - "21119:21119"
        volumes:
            - /opt/yomie-data:/opt/rustdesk
        environment:
            - RELAY_SERVERS=115.186.50.85
            - INIT_ADMIN_PASS=NjYBWzYSAz4cnc
            - DB_URL=postgres://yomie:yomie123@postgres:5432/yomie?sslmode=disable
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:21114/api/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s
        restart: unless-stopped
        networks:
            - yomie

    console:
        container_name: yomie-console
        build:
            context: .
            dockerfile: Dockerfile.console
        pull_policy: never
        ports:
            - "5000:5000"
            - "21121:21121"
        volumes:
            - /opt/yomie-data:/opt/rustdesk:ro
            - console_data:/app/data
        environment:
            - NODE_ENV=production
            - PORT=5000
            - HOST=0.0.0.0
            - API_HOST=0.0.0.0
            - RUSTDESK_PATH=/opt/rustdesk
            - HBBS_API_URL=http://yomie-server:21114/api
            - BETTERDESK_API_URL=http://yomie-server:21114/api
            - SERVER_BACKEND=yomie
            - DATA_DIR=/app/data
            - DB_PATH=/opt/rustdesk/db_v2.sqlite3
            - PUB_KEY_PATH=/opt/rustdesk/id_ed25519.pub
            - API_KEY_PATH=/opt/rustdesk/.api_key
            - KEYS_PATH=/opt/rustdesk
            - DEFAULT_ADMIN_PASSWORD=NjYBWzYSAz4cnc
            - FORCE_PASSWORD_UPDATE=true
            - WS_HBBS_HOST=yomie-server
            - WS_HBBS_PORT=21116
            - WS_HBBR_HOST=yomie-server
            - WS_HBBR_PORT=21117
            - DOCKER=true
            - DB_TYPE=postgresql
            - DATABASE_URL=postgres://yomie:yomie123@postgres:5432/yomie?sslmode=disable
        depends_on:
            postgres:
                condition: service_healthy
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped
        networks:
            - yomie

networks:
    yomie:
        driver: bridge

volumes:
    console_data:
    postgres_data:
